openapi: 3.1.0
info:
  title: Harém Brasil API
  version: 1.0.0
  description: API backend para a plataforma Harém Brasil

servers:
  - url: http://localhost:40080
    description: Desenvolvimento local

paths:
  /api/v1/auth/register:
    post:
      operationId: register
      summary: Registar novo usuário
      tags: [Autenticação]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              valid:
                summary: Registo válido
                value:
                  email: user@example.com
                  screen_name: cooluser
                  password: SecurePass123!
                  accept_terms_version: "1.0"
      responses:
        "201":
          description: Utilizador criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: JSON inválido ou corpo malformado
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Email ou screen_name já existe
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: Erro de validação (campos obrigatórios ou formato inválido)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "429":
          description: Rate limit excedido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /api/v1/auth/login:
    post:
      operationId: login
      summary: Autenticar usuário com email e senha
      tags: [Autenticação]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              valid:
                summary: Credenciais válidas
                value:
                  email: user@example.com
                  password: SecurePass123!
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: JSON inválido ou corpo malformado
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Credenciais inválidas
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: Erro de validação (campos obrigatórios ou formato inválido)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "429":
          description: Rate limit excedido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      summary: Renovar par de tokens via refresh token opaco
      tags: [Autenticação]
  /api/v1/creator/earnings/summary:
    get:
      operationId: getCreatorEarningsSummary
      tags: [Criador]
      security:
        - bearerAuth: []
      summary: Sumário agregado de ganhos (catálogo)
      description: |
        Agrega valores de pedidos com pagamento confirmado (`paid`, `fulfilled`) por moeda no intervalo `[from, to)` em UTC.
        A comissão da plataforma aplica-se sobre o bruto (`PLATFORM_COMMISSION_BPS`, predefinição 1500 = 15%).
        Não devolve compradores nem IDs de pedidos — apenas totais. BOLA: só o criador autenticado acede aos seus dados (`creator_id`).
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            maxLength: 48
          description: |
            Limite inferior inclusivo. Data `YYYY-MM-DD` (UTC) ou instante RFC3339.
            Deve ser enviado em conjunto com `to`, ou ambos omitidos (últimos 30 dias até ao instante atual).
        - name: to
          in: query
          required: false
          schema:
            type: string
            maxLength: 48
          description: |
            Limite superior exclusivo. Para só data `YYYY-MM-DD`, corresponde ao fim desse dia civil em UTC (implementado como meia-noite do dia seguinte).
            Para RFC3339, o instante é exclusivo — intervalo semiaberto `[from, to)`.
      responses:
        "200":
          description: Totais por moeda
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorEarningsSummaryResponse"
              examples:
                oneCurrency:
                  summary: Uma moeda
                  value:
                    period_from: "2026-04-01T00:00:00Z"
                    period_to_exclusive: "2026-05-01T00:00:00Z"
                    platform_commission_basis_points: 1500
                    summaries:
                      - currency: BRL
                        gross_cents: 10000
                        platform_fee_cents: 1500
                        net_cents: 8500
                        paid_orders_count: 3
        "400":
          description: Intervalo inválido, mistura from/to, ou período superior a 366 dias
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Não autenticado
        "403":
          description: Papel insuficiente (requer creator ou admin)

  /api/v1/creator/catalog:
    get:
      operationId: listCreatorCatalog
      tags: [Criador]
      security:
        - bearerAuth: []
      summary: Listar itens do catálogo do criador autenticado
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Timestamp RFC3339 copiado de next_cursor da página anterior (paginação por created_at)
      responses:
        "200":
          description: Lista paginada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CursorPageCreatorCatalog"
              examples:
                empty:
                  summary: Sem itens
                  value:
                    data: []
                    has_more: false
        "400":
          description: Cursor inválido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Não autenticado
        "403":
          description: Papel insuficiente (requer creator ou admin)

    post:
      operationId: createCreatorCatalogItem
      tags: [Criador]
      security:
        - bearerAuth: []
      summary: Criar item pago no catálogo (ligado ao perfil do criador)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Tokens renovados com sucesso (rotação: token anterior invalidado)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: JSON inválido ou corpo malformado
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Refresh token inválido, expirado ou revogado
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit excedido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Revogar sessão corrente (refresh token)
      description: Requer autenticação JWT. Idempotente — 204 mesmo se token já revogado ou inexistente.
      tags: [Autenticação]
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Sessão revogada com sucesso (ou já estava revogada)
        "401":
          description: JWT ausente ou inválido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit excedido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /api/v1/auth/logout-all:
    post:
      operationId: logoutAll
      summary: Revogar todas as sessões do utilizador
      description: Requer autenticação JWT. Idempotente — 204 mesmo sem sessões ativas.
      tags: [Autenticação]
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Todas as sessões revogadas com sucesso
        "401":
          description: JWT ausente ou inválido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit excedido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /api/v1/auth/oauth/{provider}/authorize:
    get:
      operationId: oauthAuthorize
      summary: Iniciar fluxo OAuth Authorization Code + PKCE
      description: |
        Redireciona o utilizador para o provider (ex. Google) com code_challenge S256.
        O state é armazenado em cookie HttpOnly para proteção CSRF; o nonce é validado server-side.
        redirect_uri é validado contra allowlist configurada (OAUTH_GOOGLE_ALLOWED_REDIRECT_URIS).
        Parâmetro redirect_uri opcional (senão usa Referer).
      tags: [Autenticação]
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google]
          description: Nome do provider OAuth
        - name: redirect_uri
          in: query
          schema:
            type: string
            format: uri
          description: URI de callback esperada (senão usa Referer header)
      responses:
        "302":
          description: Redirecionamento para a página de autorização do provider
          headers:
            Set-Cookie:
              schema:
                type: string
              description: "oauth_state=stateID.nonce; HttpOnly; Max-Age=600"
            Location:
              schema:
                type: string
                format: uri
        "400":
          description: Provider não suportado
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit excedido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /api/v1/auth/oauth/{provider}/callback:
    get:
      operationId: oauthCallback
      summary: Callback OAuth — troca code por tokens Harém
      description: |
        Valida state (CSRF via cookie + nonce server-side), troca authorization code por tokens no provider
        via PKCE, valida ID token (iss/aud/nonce) se presente (OIDC §3), busca userinfo,
        e cria/liga utilizador. Retorna AuthResponse.
        Logs não contêm código de autorização nem access token do provider.
        Se o provider retornar error em vez de code, responde 400 ProblemDetail.
      tags: [Autenticação]
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google]
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State retornado pelo provider (deve corresponder ao cookie)
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code do provider
        - name: error
          in: query
          schema:
            type: string
          description: Código de erro do provider (ex. access_denied) — se presente, code é ignorado
        - name: error_description
          in: query
          schema:
            type: string
          description: Descrição legível do erro do provider
        - name: redirect_uri
          in: query
          schema:
            type: string
            format: uri
          description: URI de callback (deve corresponder à usada em authorize)
      responses:
        "200":
          description: Autenticação OAuth concluída — tokens Harém emitidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: State inválido/expirado, provider não suportado, ou parâmetros em falta
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Conflito — email já existe com conta diferente
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "502":
          description: Falha ao comunicar com o provider (token exchange ou userinfo)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit excedido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /api/v1/me:
    get:
      operationId: getMe
      summary: Obter perfil do utilizador autenticado
      description: Retorna dados privados do utilizador (sem campos internos como password_hash). Requer JWT.
      tags: [Perfil]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Perfil do utilizador
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPrivate"
        "401":
          description: JWT ausente ou inválido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit excedido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    patch:
      operationId: patchMe
      summary: Atualizar perfil do utilizador autenticado
      description: |
        Atualiza apenas campos whitelisted: screen_name, bio, locale, notify_preferences.
        Campos não whitelisted são ignorados; chaves não permitidas em notify_preferences
        geram 422 (ProblemDetail). Validação de tamanho em bytes e runes onde texto livre (§1.3).
        BOLA implícito — só o próprio sub pode alterar (via JWT).
      tags: [Perfil]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMeRequest"
            examples:
              updateBio:
                summary: Atualizar bio
                value:
                  bio: "Novo texto de bio"
              updatePrefs:
                summary: Atualizar preferências de notificação
                value:
                  notify_preferences:
                    email: false
                    push: true
      responses:
        "200":
          description: Perfil atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPrivate"
        "400":
          description: JSON inválido ou corpo malformado
              $ref: "#/components/schemas/CreatorCatalogCreateRequest"
            examples:
              pack:
                summary: Item com mídia
                value:
                  title: Pack fotos exclusivas
                  description: Coleção em alta resolução.
                  price_cents: 2990
                  currency: BRL
                  visibility: subscribers
                  media:
                    - https://cdn.example.com/preview1.jpg
      responses:
        "201":
          description: Item criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorCatalogItem"
        "400":
          description: Validação ou JSON inválido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: JWT ausente ou inválido
          description: Não autenticado
        "403":
          description: Papel insuficiente

  /api/v1/creator/catalog/{item_id}:
    parameters:
      - name: item_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      operationId: patchCreatorCatalogItem
      tags: [Criador]
      security:
        - bearerAuth: []
      summary: Atualizar item (whitelist; só dono ou admin)
      description: |
        Campos omitidos não são alterados. Outro criador recebe 404 (BOLA).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatorCatalogPatchRequest"
            examples:
              price:
                summary: Só preço
                value:
                  price_cents: 3490
      responses:
        "200":
          description: Item atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorCatalogItem"
        "400":
          description: Nenhum campo ou validação falhou
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: Erro de validação (campo não whitelisted ou valor inválido)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "429":
          description: Rate limit excedido
        "401":
          description: Não autenticado
        "403":
          description: Papel insuficiente
        "404":
          description: Item inexistente ou não autorizado para este usuário

    delete:
      operationId: deleteCreatorCatalogItem
      tags: [Criador]
      security:
        - bearerAuth: []
      summary: Remover item do catálogo (DELETE físico na base de dados)
      responses:
        "204":
          description: Linha removida de creator_catalog
        "401":
          description: Não autenticado
        "403":
          description: Papel insuficiente
        "404":
          description: Item inexistente ou não autorizado
        "409":
          description: Item referenciado por pedidos (creator_orders); não pode apagar
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

components:
  schemas:
    RegisterRequest:
      type: object
      required: [email, screen_name, password, accept_terms_version]
      properties:
        email:
          type: string
          format: email
          maxLength: 320
          description: Email do usuário
          examples:
            - user@example.com
        screen_name:
          type: string
          minLength: 2
          maxLength: 64
          description: Nome de exibição do usuário
          examples:
            - cooluser
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[\\p{P}\\p{S}]).{8,}$"
          description: Senha do usuário (mínimo 8 caracteres, 1 maiúscula, 1 minúscula, 1 dígito, 1 especial)
        accept_terms_version:
          type: string
          maxLength: 32
          description: Versão dos termos aceites pelo usuário
          examples:
            - "1.0"
      additionalProperties: false

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 320
          description: Email do usuário
          examples:
            - user@example.com
        password:
          type: string
          format: password
          maxLength: 128
          description: Senha do usuário
      additionalProperties: false

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT de acesso (expira em 15 minutos)
        access_expires_in:
          type: integer
          description: Duração do access token em segundos
          examples:
            - 900
        refresh_token:
          type: string
          description: Token de renovação (expira em 7 dias)
        refresh_expires_in:
          type: integer
          description: Duração do refresh token em segundos
          examples:
            - 604800
        token_type:
          type: string
          enum: [Bearer]
        expires_at:
          type: string
          format: date-time
          description: Timestamp de expiração do access token
        user:
          $ref: "#/components/schemas/UserPublic"
      required: [access_token, access_expires_in, refresh_token, refresh_expires_in, token_type, expires_at, user]

    UserPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        screen_name:
          type: string
          description: Nome de exibição do usuário
        email:
          type: string
          format: email
        role:
          type: string
          enum: [guest, user, creator, moderator, admin]
        avatar_url:
          type: string
          format: uri
        bio:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, screen_name, role, created_at]

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
      required: [title, status]

    ValidationError:
      allOf:
        - $ref: "#/components/schemas/ProblemDetail"
        - type: object
          properties:
            extensions:
              type: object
              properties:
                fields:
                  type: object
                  additionalProperties:
                    type: string

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Token de renovação opaco recebido no login/registro/refresh anterior
      additionalProperties: false

    LogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: Token de renovação a revogar (opcional — se omitido, não revoga nenhum refresh token)
      additionalProperties: false

    UserPrivate:
      type: object
      description: Perfil completo do utilizador autenticado (sem campos internos como password_hash)
    CursorPageCreatorCatalog:
      type: object
      additionalProperties: false
      required: [data, has_more]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CreatorCatalogItem"
        next_cursor:
          type: string
        has_more:
          type: boolean

    CreatorCatalogItem:
      type: object
      additionalProperties: false
      required:
        [id, title, description, price_cents, currency, visibility, media, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        screen_name:
          type: string
          minLength: 2
          maxLength: 64
        email:
          type: string
          format: email
        role:
          type: string
          enum: [guest, user, creator, moderator, admin]
        avatar_url:
          type: string
          format: uri
        bio:
          type: string
          maxLength: 512
        locale:
          type: string
          maxLength: 16
          description: Código de idioma/região (ex. pt-BR, en-US)
          examples:
            - pt-BR
        notify_preferences:
          type: object
          description: Preferências de notificação (apenas chaves whitelisted)
          properties:
            email:
              type: boolean
            push:
              type: boolean
          additionalProperties: false
        email_verified_at:
          type: string
          format: date-time
        accept_terms_version:
          type: string
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 10000
        price_cents:
          type: integer
          minimum: 0
          maximum: 999999999
          description: Preço em cêntimos (inteiro)
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
          description: ISO 4217
          examples: [BRL, USD]
        visibility:
          type: string
          enum: [public, subscribers, premium]
        media:
          type: array
          maxItems: 20
          items:
            type: string
            maxLength: 2048
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, screen_name, email, role, locale, notify_preferences, created_at]

    PatchMeRequest:
      type: object
      description: |
        Payload para PATCH /me — apenas campos whitelisted.
        Campos não whitelisted no JSON são ignorados pelo binding (additionalProperties: false).
        Chaves não permitidas em notify_preferences geram 422.
      properties:
        screen_name:
          type: string
          minLength: 2
          maxLength: 64
          description: Novo nome de exibição
        bio:
          type: string
          maxLength: 512
          description: Nova bio (máx 512 runes / 4096 bytes)
        locale:
          type: string
          maxLength: 16
          description: Novo código de idioma/região
        notify_preferences:
          type: object
          properties:
            email:
              type: boolean
            push:
              type: boolean
          additionalProperties: false
          description: Preferências de notificação (apenas email e push permitidos)
      additionalProperties: false

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

    CreatorCatalogCreateRequest:
      type: object
      additionalProperties: false
      required: [title, price_cents, currency, visibility]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 10000
        price_cents:
          type: integer
          minimum: 0
          maximum: 999999999
        currency:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 (normalizado para maiúsculas na API)
        visibility:
          type: string
          enum: [public, subscribers, premium]
        media:
          type: array
          maxItems: 20
          items:
            type: string
            maxLength: 2048

    CreatorEarningsSummaryResponse:
      type: object
      additionalProperties: false
      required:
        [period_from, period_to_exclusive, platform_commission_basis_points, summaries]
      properties:
        period_from:
          type: string
          format: date-time
          description: Limite inferior inclusivo aplicado (RFC3339 UTC)
        period_to_exclusive:
          type: string
          format: date-time
          description: Limite superior exclusivo aplicado (RFC3339 UTC)
        platform_commission_basis_points:
          type: integer
          minimum: 0
          maximum: 10000
          description: Comissão da plataforma em basis points (ex. 1500 = 15%)
        summaries:
          type: array
          items:
            $ref: "#/components/schemas/CreatorEarningsCurrencySummary"

    CreatorEarningsCurrencySummary:
      type: object
      additionalProperties: false
      required:
        [currency, gross_cents, platform_fee_cents, net_cents, paid_orders_count]
      properties:
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
          description: ISO 4217
        gross_cents:
          type: integer
          format: int64
          minimum: 0
        platform_fee_cents:
          type: integer
          format: int64
          minimum: 0
        net_cents:
          type: integer
          format: int64
          minimum: 0
        paid_orders_count:
          type: integer
          format: int64
          minimum: 0

    CreatorCatalogPatchRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 10000
        price_cents:
          type: integer
          minimum: 0
          maximum: 999999999
        currency:
          type: string
          minLength: 3
          maxLength: 3
        visibility:
          type: string
          enum: [public, subscribers, premium]
        media:
          type: array
          maxItems: 20
          items:
            type: string
            maxLength: 2048

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT HS256 (issuer harem-api); rotas de criador exigem role creator ou admin.
